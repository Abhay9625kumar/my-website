<!DOCTYPE html>
<html>
<head>
    <title>Ekart - Online Store</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Navbar -->
<header class="navbar">
    <div class="logo">Ekart</div>

    <input type="text" placeholder="Search for products...">

    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#products">Products</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<!-- Hero -->
<section id="home" class="hero">
    <h1>Big Deals, Best Prices</h1>
    <p>Upgrade your lifestyle with top products</p>
    <button>Shop Now</button>
</section>

<!-- Products -->
<section id="products" class="section">
    <h2>Our Products</h2>

    <div class="product-container">

        <div class="product-card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRvmLW8e3dBcHsznfS9A0y0Pt3a6pZ8SwsiOg&s">
            <h3>Smartphone</h3>
            <p>₹10,000</p>
            <button>Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_PMYOAavmiNDnfCcf9b6a6OS-rfbnPxRc6w&s">
            <h3>Headphones</h3>
            <p>₹1,500</p>
            <button>Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://m.media-amazon.com/images/I/61GpeUi6WjL._AC_UY1000_.jpg">
            <h3>Shoes</h3>
            <p>₹2,000</p>
            <button>Add to Cart</button>
        </div>

    </div>
</section>

<!-- Contact -->
<section id="contact" class="section">
    <h2>Contact Us</h2>

    <form class="contact-form">
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea placeholder="Your Message"></textarea>
        <button type="submit">Send Message</button>
    </form>
</section>

<!-- About -->
<section id="about" class="section">
    <h2>About Us</h2>
    <p>We provide quality products with best prices and fast delivery.</p>
</section>


<!-- Footer -->
<footer>
    <p>© 2026 MyShop | All Rights Reserved</p>
</footer>

</body>
</html>
